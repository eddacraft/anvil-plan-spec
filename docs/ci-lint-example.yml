# Example GitHub Actions workflow for APS linting
#
# Add this to .github/workflows/lint-aps.yml in your project.
#
# Prerequisites: none — this workflow installs the APS CLI globally on the
# runner before linting. If you commit `bin/aps` and `lib/` to your repo,
# you can skip the install step and call `./bin/aps lint plans/` directly.

name: Lint APS Documents

on:
  push:
    paths:
      - "plans/**/*.aps.md"
      - "plans/**/*.actions.md"
  pull_request:
    paths:
      - "plans/**/*.aps.md"
      - "plans/**/*.actions.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install APS CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/EddaCraft/anvil-plan-spec/main/scaffold/install \
            | bash -s -- --global
          echo "$HOME/.aps/bin" >> "$GITHUB_PATH"

      - name: Lint APS documents
        run: aps lint plans/

      - name: Capture results on failure
        if: failure()
        run: aps lint plans/ --json > aps-lint-results.json

      - name: Upload artefact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aps-lint-results
          path: aps-lint-results.json
