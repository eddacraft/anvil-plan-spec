name: Release CLI

# Release bump checklist (INSTALL-015 / D-036 — one semver across all channels):
#
#   1. Bump the tag semver everywhere it is stamped, and commit Cargo.lock.
#        Beyond cli/Cargo.toml: package.json; the CLI_VERSION defaults +
#        emitted config version in lib/scaffold.sh, lib/Scaffold.psm1,
#        lib/rules/common.sh, lib/export.sh; the curl install/update
#        fallbacks (scaffold/{install,update}{,.ps1}); packaging/scoop/aps.json
#        (version + asset URL — NOT the hash yet, see step 4); .aps/config.yml;
#        and the README version badge. The prep sweep is easy to under-do — a
#        stray file ships the old version. Confirm none remain (OLD = prior
#        semver; the cli/src hits are test fixtures, not stamps):
#          git grep -n 'OLD' -- ':!plans' ':!docs' ':!CHANGELOG.md' \
#            ':!test' ':!cli/src' ':!*.lock' ':!pnpm-lock.yaml'
#   2. Tag the release:  git tag vX.Y.Z && git push origin vX.Y.Z
#        -> this workflow builds the five TUI-006 targets and publishes the
#           GitHub release assets (aps-<target>.{tar.gz,zip} + SHA256SUMS).
#   3. crates.io:  cd cli && cargo publish
#        -> all deps carry crates.io versions (eddacraft-tui 0.4+). cargo-binstall
#           also works via GitHub assets (see cli/Cargo.toml [package.metadata.binstall]).
#   4. Scoop — two surfaces, both must carry the new version AND the real hash
#      from the published SHA256SUMS (step 1 bumped version + URL only):
#        a) packaging/scoop/aps.json in this repo — the direct-URL install
#           documented in the README. Set architecture.64bit.hash to the
#           aps-x86_64-pc-windows-gnu.zip line from SHA256SUMS; commit here.
#        b) bucket/aps.json in eddacraft/scoop-bucket (direct commit to main;
#           the bucket takes no PRs) — powers `scoop install eddacraft/aps`.
#           Same version + hash. anvil is a separate tool in that bucket.
#   5. Verify:  smoke `aps --version` / `aps lint --help` on each target;
#        `VERSION=X.Y.Z curl .../scaffold/install | bash -s -- --cli` (binary);
#        crates.io shows the new version; the bucket manifest is live.
#
# The install script, install.ps1, crates.io pin, README badge, and both Scoop
# manifests all reference the same semver as the tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            mingw: true
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64
        if: matrix.mingw
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli -> target
          key: ${{ matrix.target }}

      - name: Build
        working-directory: cli
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          case "${{ matrix.target }}" in
            *windows*)
              cp "cli/target/${{ matrix.target }}/release/aps.exe" dist/
              (cd dist && zip "aps-${{ matrix.target }}.zip" aps.exe && rm aps.exe)
              ;;
            *)
              cp "cli/target/${{ matrix.target }}/release/aps" dist/
              tar -czf "dist/aps-${{ matrix.target }}.tar.gz" -C dist aps
              rm dist/aps
              ;;
          esac

      - name: Smoke test (native targets)
        if: matrix.target != 'x86_64-pc-windows-gnu' && matrix.target != 'x86_64-apple-darwin'
        run: cli/target/${{ matrix.target }}/release/aps --version

      - uses: actions/upload-artifact@v4
        with:
          name: aps-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum aps-* > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aps-*
            dist/SHA256SUMS
          generate_release_notes: true
