name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli -> target

      - name: cargo fmt
        working-directory: cli
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: cli
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: cargo test
        working-directory: cli
        run: cargo test --locked

      - name: cargo build
        working-directory: cli
        run: cargo build --locked

      - name: Native Unix user journey
        run: bash test/native-user-journey.sh
        env:
          APS_BIN: cli/target/debug/aps

      # Compile-check the Windows target on every PR. The release workflow is
      # the only place that *builds* Windows, so without this a unix-only API
      # (as in v0.5.0's audit.rs) is first discovered at tag time, failing the
      # release. `cargo check` needs no mingw linker.
      - name: cargo check (windows cross)
        working-directory: cli
        run: cargo check --locked --target x86_64-pc-windows-gnu

  # Dogfood the composite action (action.yml) — the same one-liner a
  # consuming team adds. Guards both this repo's plans and the action itself.
  aps-lint:
    name: APS plan lint (dogfood action)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint plans via local action
        uses: ./
        with:
          plans-dir: plans

  shell:
    name: Shell script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: bash -n
        run: |
          set -e
          mapfile -t files < <(find scaffold bin -type f \( -name "*.sh" -o -perm -u+x \) | sort -u)
          for f in "${files[@]}"; do
            echo "checking $f"
            bash -n "$f"
          done

  tests:
    name: CLI test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      # Install MCP deps so test/run.sh runs the MCP server tests instead of
      # skipping them (the suite auto-skips when mcp/node_modules is absent).
      - name: Install MCP dependencies
        working-directory: mcp
        run: pnpm install --frozen-lockfile

      - name: Run CLI test suite
        run: bash test/run.sh

  powershell:
    name: PowerShell parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ubuntu-latest ships pwsh preinstalled; verify the lib/*.psm1 port
      # behaviourally across the fixture corpus — nested-plans (MONO-002),
      # cross-tree module IDs (MONO-008), conductor rules and status gating
      # (COND-007/CIP-001). String guards in test/run.sh prove a rule exists;
      # this proves it behaves.
      - name: Run PowerShell parity harness
        shell: pwsh
        run: ./test/ps-parity.ps1

  windows-gnu-artifact:
    name: Build shipped Windows GNU archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install MinGW linker
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli -> target
          key: x86_64-pc-windows-gnu

      - name: Build shipped Windows target
        working-directory: cli
        run: cargo build --release --locked --target x86_64-pc-windows-gnu

      - name: Package release-shaped archive
        run: |
          mkdir -p dist
          cp cli/target/x86_64-pc-windows-gnu/release/aps.exe dist/
          cd dist
          zip aps-x86_64-pc-windows-gnu.zip aps.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-gnu-archive
          path: dist/aps-x86_64-pc-windows-gnu.zip
          if-no-files-found: error

  windows-user-journey:
    name: Native Windows PowerShell user journey
    needs: windows-gnu-artifact
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: windows-gnu-archive
          path: dist

      - name: Run PowerShell 7 user journey
        shell: pwsh
        run: ./test/windows-user-journey.ps1 -ReleaseArchive ./dist/aps-x86_64-pc-windows-gnu.zip

      - name: Run Windows PowerShell 5.1 user journey
        shell: powershell
        run: ./test/windows-user-journey.ps1 -ReleaseArchive ./dist/aps-x86_64-pc-windows-gnu.zip

  cli-parity:
    name: Cross-CLI lint parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli -> target

      - name: Build Rust CLI
        working-directory: cli
        run: cargo build --locked

      # ubuntu-latest ships bash and pwsh; the Rust binary is built above. The
      # harness lints the fixture corpus with all three CLIs and fails on any
      # divergence in findings (code, message, line, order) — the structural
      # form of the D-038/D-039 lockstep contract (CIP-002).
      - name: Run cross-CLI parity harness
        run: bash test/cli-parity.sh
        env:
          APS_RUST_BIN: cli/target/debug/aps
